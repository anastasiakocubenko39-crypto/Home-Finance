<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Накопичення</title>
  <link rel="stylesheet" href="savings.css">
</head>
<body>

<button class="back-btn" onclick="goHome()">🏠 Головна</button>

<h1>💰 Накопичення</h1>

<section class="form-card">
  <input id="name" placeholder="Назва цілі">
  <input id="goal" type="number" placeholder="Сума цілі">

  <select id="currency">
    <option value="грн">грн</option>
    <option value="$">$</option>
    <option value="€">€</option>
  </select>

  <button onclick="addGoal()">Додати</button>
</section>

<section class="summary">
  <h2>📊 Загальний прогрес</h2>
  <div id="summaryChart" class="chart"></div>
</section>

<div id="list" class="grid"></div>

<div id="modal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle">Операція</h3>

    <input id="modalAmount" type="number" placeholder="Сума">

    <select id="modalCurrency">
      <option value="грн">грн</option>
      <option value="$">$</option>
      <option value="€">€</option>
    </select>

    <div class="modal-actions">
      <button onclick="confirmAction()">OK</button>
      <button class="gray" onclick="closeModal()">Закрити</button>
    </div>
  </div>
</div>

<script type="module" src="savings.js"></script>
</body>
</html>
