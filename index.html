<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Фінансовий помічник</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Фінансовий помічник</h1>

<section class="panel">
 <h2>Історія витрат</h2>

<select id="monthFilter">
  <option value="">Оберіть місяць</option>
  <option value="1">Січень</option>
  <option value="2">Лютий</option>
  <option value="3">Березень</option>
  <option value="4">Квітень</option>
  <option value="5">Травень</option>
  <option value="6">Червень</option>
  <option value="7">Липень</option>
  <option value="8">Серпень</option>
  <option value="9">Вересень</option>
  <option value="10">Жовтень</option>
  <option value="11">Листопад</option>
  <option value="12">Грудень</option>
</select>

<input id="yearFilter" type="number" placeholder="Рік (наприклад 2026)">

<button onclick="loadHistory()">Показати</button>

<div id="history"></div>

  <input type="number" id="totalInput" placeholder="Введи бюджет">
  <button onclick="setTotal()">Зберегти бюджет</button>
  <button onclick="resetMonth()">Обнулити місяць</button>

  <div class="balance">
    <div>Залишок: <b id="left">0</b> грн</div>
    <div>Витрати: <b id="spent">0</b> грн</div>
  </div>

  <p id="lastUpdate"></p>
</section>

<div class="container">
  <div class="card" onclick="goTo('products.html')">🛒 Продукти<br><span id="productsTotal">0 грн</span></div>
  <div class="card" onclick="goTo('walks.html')">🚶 Прогулянки<br><span id="walksTotal">0 грн</span></div>
  <div class="card" onclick="goTo('home.html')">🧴 Побутова хімія<br><span id="homeTotal">0 грн</span></div>
  <div class="card" onclick="goTo('bills.html')">💡 Комуналка<br><span id="billsTotal">0 грн</span></div>
  <div class="card" onclick="goTo('savings.html')">💰 Відкладені</div>
<a href="planner.html">
  <button>📅 Плани</button>
</a>
</div>

<section class="panel">
  <h2>Додати витрату</h2>
  <input type="number" id="amount" placeholder="Сума">
  <select id="expenseType">
    <option value="products">Продукти</option>
    <option value="walks">Прогулянки</option>
    <option value="home">Побут</option>
    <option value="bills">Комуналка</option>
  </select>
  <button onclick="addExpense()">Додати</button>
</section>

<section class="panel">
  <h2>Нагадування</h2>
  <input id="text" placeholder="Що зробити">
  <input id="date" type="date">
  <button onclick="addReminder()">Додати</button>
  <div id="result"></div>
</section>

<section class="panel">
  <h2>📅 Найближчі плани</h2>
<div id="plansPreview"></div>
  <h2 id="monthTitle"></h2>
  <div id="calendar"></div>
</section>


<script type="module" src="script.js"></script>
</body>
</html>
