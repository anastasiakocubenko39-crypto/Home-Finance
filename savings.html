<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Накопичення</title>
  <link rel="stylesheet" href="savings.css">
</head>
<body>

<div class="sub-header">
  <button class="back-btn" onclick="goHome()">← Назад</button>
  <h1>💰 Накопичення</h1>
</div>

<div class="sec-label">Нова ціль</div>
<div class="panel">
  <div class="form-row">
    <input id="name" placeholder="Назва цілі" style="flex:2;min-width:0">
    <input id="goal" type="number" placeholder="Сума" style="flex:1;min-width:0">
    <select id="currency" style="width:65px;min-width:0">
      <option value="грн">грн</option>
      <option value="$">$</option>
      <option value="€">€</option>
    </select>
  </div>
  <button class="btn full" onclick="addGoal()">➕ Додати ціль</button>
</div>

<div class="sec-label">📊 Загальний прогрес</div>
<div class="panel">
  <div id="summaryChart" class="chart-wrap"></div>
</div>

<div class="sec-label">Мої цілі</div>
<div id="list" class="savings-grid" style="padding-bottom:20px"></div>

<!-- Modal -->
<div id="modal" class="modal">
  <div class="modal-box">
    <h3 id="modalTitle">Операція</h3>
    <input id="modalAmount" type="number" placeholder="Сума" style="width:100%;margin-bottom:10px">
    <select id="modalCurrency" style="width:100%">
      <option value="грн">грн</option>
      <option value="$">$</option>
      <option value="€">€</option>
    </select>
    <div class="modal-actions">
      <button class="btn" onclick="confirmAction()">✓ OK</button>
      <button class="btn gray" onclick="closeModal()">Закрити</button>
    </div>
  </div>
</div>

<script type="module" src="savings.js"></script>

<script>
  // Modal open/close через CSS клас
  const _origOpen  = window.openModal;
  const _origClose = window.closeModal;
  function patchSavingsModal() {
    if (!window.openModal) return setTimeout(patchSavingsModal, 300);
    window.openModal = function (id, type) {
      _origOpen(id, type);
      document.getElementById("modal").classList.add("open");
    };
    window.closeModal = function () {
      _origClose();
      document.getElementById("modal").classList.remove("open");
    };
  }
  patchSavingsModal();
</script>
</body>
</html>
